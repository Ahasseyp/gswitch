name: Release

on:
  push:
    branches: [main]
    paths: [VERSION]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          gh release create "v${version}" \
            --title "v${version}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
